server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:oauth2_boilerplate}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# ──────────────────────────────────────
# JWT Configuration
# ──────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-256-bit-secret-key-at-least-32-chars}
  access-token-expiry: 3600000      # 1시간 (ms)
  refresh-token-expiry: 604800000   # 7일 (ms)

# ──────────────────────────────────────
# OAuth2 Provider Configuration
# ──────────────────────────────────────
oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/callback/google}
    auth-url: https://accounts.google.com/o/oauth2/v2/auth
    token-url: https://oauth2.googleapis.com/token
    user-info-url: https://www.googleapis.com/oauth2/v2/userinfo
    scope: email profile

  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/callback/kakao}
    auth-url: https://kauth.kakao.com/oauth/authorize
    token-url: https://kauth.kakao.com/oauth/token
    user-info-url: https://kapi.kakao.com/v2/user/me
    scope: profile_nickname

  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8080/api/auth/callback/naver}
    auth-url: https://nid.naver.com/oauth2.0/authorize
    token-url: https://nid.naver.com/oauth2.0/token
    user-info-url: https://openapi.naver.com/v1/nid/me

  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/callback/github}
    auth-url: https://github.com/login/oauth/authorize
    token-url: https://github.com/login/oauth/access_token
    user-info-url: https://api.github.com/user
    scope: user:email

  ssafy:
    client-id: ${SSAFY_CLIENT_ID:}
    client-secret: ${SSAFY_CLIENT_SECRET:}
    redirect-uri: ${SSAFY_REDIRECT_URI:http://localhost:8080/api/auth/callback/ssafy}
    auth-url: https://project.ssafy.com/oauth/sso-check
    token-url: https://project.ssafy.com/ssafy/oauth2/token
    user-info-url: https://project.ssafy.com/ssafy/resources/userInfo
